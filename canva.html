<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MICSA · Diseñador de Publicidad</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#f5f5f7;--panel:#ffffff;--border:#e0e0e4;--acc:#b8952e;--txt:#1a1a1a;--mut:#7a7a8a;--green:#1a8a35;--red:#d42020;--in:#f0f0f3;--sel:#b8952e33;}
html,body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none;}

/* ── TOP BAR ── */
#top{height:48px;min-height:48px;background:#ffffff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:100;}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo{font-family:'Black Ops One',sans-serif;font-size:15px;letter-spacing:3px;color:var(--acc);}
.logo-sub{font-size:10px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;}
.top-acts{display:flex;gap:8px;align-items:center;}
.btn{font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;}
.btn-acc{background:var(--acc);color:#000;border-color:var(--acc);}
.btn-acc:hover{opacity:.85;}
.btn-sec{background:transparent;color:var(--mut);border-color:var(--border);}
.btn-sec:hover{border-color:var(--acc);color:var(--acc);}
.btn-ghost{background:transparent;color:var(--mut);border:none;padding:7px 10px;}
.btn-ghost:hover{color:var(--acc);}

/* ── LAYOUT ── */
#app{flex:1;display:flex;overflow:hidden;}

/* ── LEFT SIDEBAR ── */
#sidebar{width:260px;min-width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-tab{flex:1;padding:10px 8px;text-align:center;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.sb-tab:hover{color:var(--txt);}
.sb-tab.active{color:var(--acc);border-bottom-color:var(--acc);}
.sb-content{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:#ccc transparent;}
.sb-section{margin-bottom:16px;}
.sb-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:8px;}

/* Templates */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tpl-card{background:var(--in);border:1px solid var(--border);border-radius:4px;padding:8px;cursor:pointer;transition:all .15s;text-align:center;}
.tpl-card:hover{border-color:var(--acc);}
.tpl-card.active{border-color:var(--acc);background:#faf6eb;}
.tpl-preview{width:100%;aspect-ratio:var(--ar,16/9);background:#e8e8ec;border-radius:2px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mut);letter-spacing:1px;}
.tpl-name{font-size:10px;font-weight:600;color:var(--txt);}
.tpl-size{font-size:8px;color:var(--mut);margin-top:2px;}

/* Elements */
.el-btn{width:100%;background:var(--in);border:1px solid var(--border);border-radius:4px;padding:10px 12px;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:6px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:12px;}
.el-btn:hover{border-color:var(--acc);color:var(--acc);}
.el-btn .icon{font-size:18px;width:28px;text-align:center;}

/* Photos */
.upload-zone{width:100%;padding:24px 12px;border:2px dashed var(--border);border-radius:6px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s;margin-bottom:8px;}
.upload-zone:hover{border-color:var(--acc);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-zone .uz-icon{font-size:24px;margin-bottom:4px;}
.upload-zone .uz-text{font-size:10px;color:var(--mut);letter-spacing:1px;}
.photo-thumb{width:100%;aspect-ratio:16/9;background:var(--in);border:1px solid var(--border);border-radius:4px;overflow:hidden;cursor:pointer;position:relative;margin-bottom:6px;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-thumb .del{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:3px;color:var(--red);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.photo-thumb .del:hover{background:var(--red);color:#fff;}

/* ── CANVAS AREA ── */
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:#e8e8ec;overflow:hidden;position:relative;}
#canvas-wrap{position:relative;box-shadow:0 0 0 1px var(--border),0 8px 30px rgba(0,0,0,.12);border-radius:2px;}
canvas#main{display:block;cursor:default;}
.handle{position:absolute;width:10px;height:10px;background:var(--acc);border:2px solid #fff;border-radius:2px;cursor:pointer;z-index:20;transform:translate(-50%,-50%);display:none;}
.selection-box{position:absolute;border:2px solid var(--acc);pointer-events:none;z-index:15;display:none;}

/* ── RIGHT PANEL ── */
#props{width:240px;min-width:240px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#ccc transparent;}
#props-header{padding:10px 14px;background:#fafafa;border-bottom:1px solid var(--border);flex-shrink:0;}
#props-header span{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut);}
.prop-section{padding:12px 14px;border-bottom:1px solid var(--border);}
.prop-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:8px;}
.prop-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.prop-row label{font-size:10px;color:var(--mut);min-width:28px;letter-spacing:.5px;}
.prop-input{flex:1;background:var(--in);border:1px solid var(--border);border-radius:3px;padding:5px 8px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:11px;outline:none;}
.prop-input:focus{border-color:var(--acc);}
.prop-input-sm{width:60px;}
.prop-color{width:28px;height:28px;border:1px solid var(--border);border-radius:3px;cursor:pointer;padding:0;background:none;}
.prop-color::-webkit-color-swatch-wrapper{padding:2px;}
.prop-color::-webkit-color-swatch{border:none;border-radius:2px;}
select.prop-input{cursor:pointer;}
.prop-range{flex:1;accent-color:var(--acc);}
.prop-delete{width:100%;background:transparent;border:1px solid #f0d0d0;color:var(--red);font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;padding:7px;border-radius:3px;cursor:pointer;margin-top:4px;}
.prop-delete:hover{background:#fde8e8;}

/* ── ZOOM BAR ── */
#zoom-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:6px;padding:6px 12px;backdrop-filter:blur(8px);}
#zoom-bar .btn-ghost{padding:4px 8px;font-size:14px;}
#zoom-val{font-size:10px;color:var(--mut);letter-spacing:1px;min-width:40px;text-align:center;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="top">
  <div class="logo-area">
    <span class="logo">MICSA</span>
    <span class="logo-sub">Diseñador de Publicidad</span>
  </div>
  <div class="top-acts">
    <button class="btn btn-sec" onclick="undoAction()">↩ Deshacer</button>
    <button class="btn btn-sec" onclick="redoAction()">↪ Rehacer</button>
    <button class="btn btn-acc" onclick="exportCanvas()">⬇ Exportar PNG</button>
  </div>
</div>

<div id="app">
  <!-- LEFT SIDEBAR -->
  <div id="sidebar">
    <div class="sb-tabs">
      <div class="sb-tab active" data-tab="templates" onclick="switchTab(this)">Plantillas</div>
      <div class="sb-tab" data-tab="elements" onclick="switchTab(this)">Elementos</div>
      <div class="sb-tab" data-tab="photos" onclick="switchTab(this)">Fotos</div>
      <div class="sb-tab" data-tab="brand" onclick="switchTab(this)">Marca</div>
    </div>
    <div class="sb-content" id="sb-body"></div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-area" onmousedown="canvasMouseDown(event)" onmousemove="canvasMouseMove(event)" onmouseup="canvasMouseUp(event)">
    <div id="canvas-wrap">
      <canvas id="main"></canvas>
      <div class="selection-box" id="sel-box"></div>
    </div>
    <div id="zoom-bar">
      <button class="btn-ghost" onclick="zoomBy(-0.1)">−</button>
      <span id="zoom-val">100%</span>
      <button class="btn-ghost" onclick="zoomBy(0.1)">+</button>
      <button class="btn-ghost" onclick="zoomFit()">⊡</button>
    </div>
  </div>

  <!-- RIGHT PROPERTIES -->
  <div id="props">
    <div id="props-header"><span>Propiedades</span></div>
    <div id="props-body">
      <div class="prop-section">
        <div class="prop-label">Canvas</div>
        <p style="font-size:11px;color:var(--mut);line-height:1.5;">Selecciona un elemento en el canvas para editar sus propiedades.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let canvasW = 1080, canvasH = 1080;
let zoom = 1, panX = 0, panY = 0;
let elements = [];
let selectedId = null;
let dragging = null; // { id, offX, offY }
let resizing = null;
let uploadedPhotos = []; // { id, img, name, url }
let undoStack = [], redoStack = [];
let nextId = 1;

const TEMPLATES = [
  { name: 'Instagram Post', w: 1080, h: 1080, icon: '◻', ar: '1/1' },
  { name: 'Instagram Story', w: 1080, h: 1920, icon: '▯', ar: '9/16' },
  { name: 'Facebook Post', w: 1200, h: 628, icon: '▭', ar: '1200/628' },
  { name: 'Facebook Cover', w: 820, h: 312, icon: '▬', ar: '820/312' },
  { name: 'LinkedIn Post', w: 1200, h: 627, icon: '▭', ar: '1200/627' },
  { name: 'LinkedIn Banner', w: 1584, h: 396, icon: '▬', ar: '1584/396' },
  { name: 'Twitter Post', w: 1200, h: 675, icon: '▭', ar: '16/9' },
  { name: 'YouTube Thumb', w: 1280, h: 720, icon: '▶', ar: '16/9' },
  { name: 'WhatsApp Status', w: 1080, h: 1920, icon: '▯', ar: '9/16' },
  { name: 'Banner Web', w: 1920, h: 600, icon: '▬', ar: '1920/600' },
  { name: 'Tarjeta Visita', w: 1050, h: 600, icon: '▭', ar: '1050/600' },
  { name: 'Personalizado', w: 1080, h: 1080, icon: '✎', ar: '1/1', custom: true },
];

const BRAND = {
  colors: ['#c8a84b', '#06060a', '#f0f4f8', '#1a1a2e', '#55667a', '#3fb950', '#f85149', '#2e3e50'],
  fonts: ['Barlow Condensed', 'Barlow', 'Black Ops One', 'Arial', 'Georgia', 'Courier New'],
};

// ═══════════════════════════════════════════════════
//  ELEMENT FACTORY
// ═══════════════════════════════════════════════════
function makeText(text, opts = {}) {
  return {
    id: nextId++, type: 'text',
    x: opts.x ?? canvasW / 2 - 150, y: opts.y ?? canvasH / 2 - 20,
    w: opts.w ?? 300, h: opts.h ?? 50,
    text: text,
    fontFamily: opts.fontFamily ?? 'Barlow Condensed',
    fontSize: opts.fontSize ?? 48,
    fontWeight: opts.fontWeight ?? '700',
    color: opts.color ?? '#f0f4f8',
    align: opts.align ?? 'center',
    opacity: opts.opacity ?? 1,
    letterSpacing: opts.letterSpacing ?? 0,
    lineHeight: opts.lineHeight ?? 1.2,
    locked: false,
  };
}
function makeRect(opts = {}) {
  return {
    id: nextId++, type: 'rect',
    x: opts.x ?? canvasW / 2 - 100, y: opts.y ?? canvasH / 2 - 50,
    w: opts.w ?? 200, h: opts.h ?? 100,
    color: opts.color ?? '#c8a84b',
    opacity: opts.opacity ?? 1,
    radius: opts.radius ?? 0,
    borderColor: opts.borderColor ?? 'none',
    borderWidth: opts.borderWidth ?? 0,
    locked: false,
  };
}
function makeLine(opts = {}) {
  return {
    id: nextId++, type: 'line',
    x: opts.x ?? canvasW / 2 - 150, y: opts.y ?? canvasH / 2,
    w: opts.w ?? 300, h: opts.h ?? 4,
    color: opts.color ?? '#c8a84b',
    opacity: opts.opacity ?? 0.8,
    locked: false,
  };
}
function makeImage(img, url, opts = {}) {
  const ar = img.naturalWidth / img.naturalHeight;
  const fitW = Math.min(canvasW * 0.6, img.naturalWidth);
  const fitH = fitW / ar;
  return {
    id: nextId++, type: 'image',
    x: opts.x ?? (canvasW - fitW) / 2, y: opts.y ?? (canvasH - fitH) / 2,
    w: opts.w ?? fitW, h: opts.h ?? fitH,
    img, url,
    opacity: opts.opacity ?? 1,
    radius: opts.radius ?? 0,
    locked: false,
  };
}
function makePlaceholder(opts = {}) {
  return {
    id: nextId++, type: 'placeholder',
    x: opts.x ?? 0, y: opts.y ?? 0,
    w: opts.w ?? canvasW * 0.5, h: opts.h ?? canvasH,
    label: opts.label ?? 'SUBE TU FOTO AQUÍ',
    opacity: 1,
    locked: false,
  };
}

// ═══════════════════════════════════════════════════
//  UNDO / REDO
// ═══════════════════════════════════════════════════
function saveState() {
  undoStack.push(JSON.stringify(elements.map(e => {
    const c = {...e};
    if (c.img) { c._hasImg = true; delete c.img; }
    return c;
  })));
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}
function undoAction() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(elements.map(e => {
    const c = {...e}; if (c.img) { c._hasImg = true; delete c.img; } return c;
  })));
  const prev = JSON.parse(undoStack.pop());
  elements = prev.map(e => {
    if (e._hasImg) {
      const ph = uploadedPhotos.find(p => p.url === e.url);
      if (ph) e.img = ph.img;
      delete e._hasImg;
    }
    return e;
  });
  selectedId = null;
  renderAll();
}
function redoAction() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(elements.map(e => {
    const c = {...e}; if (c.img) { c._hasImg = true; delete c.img; } return c;
  })));
  const next = JSON.parse(redoStack.pop());
  elements = next.map(e => {
    if (e._hasImg) {
      const ph = uploadedPhotos.find(p => p.url === e.url);
      if (ph) e.img = ph.img;
      delete e._hasImg;
    }
    return e;
  });
  selectedId = null;
  renderAll();
}

// ═══════════════════════════════════════════════════
//  SIDEBAR TABS
// ═══════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderSidebar(tab.dataset.tab);
}

function renderSidebar(tab) {
  const body = document.getElementById('sb-body');
  if (tab === 'templates') {
    body.innerHTML = `
      <div class="sb-section">
        <div class="sb-label">Formato</div>
        <div class="tpl-grid">
          ${TEMPLATES.map((t, i) => `
            <div class="tpl-card ${canvasW === t.w && canvasH === t.h ? 'active' : ''}" onclick="selectTemplate(${i})" style="--ar:${t.ar}">
              <div class="tpl-preview">${t.icon}</div>
              <div class="tpl-name">${t.name}</div>
              <div class="tpl-size">${t.w}×${t.h}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Montajes e Izajes</div>
        <div class="el-btn" onclick="applyQuickDesign('izaje')"><span class="icon">🏗</span> Izaje / Maniobra</div>
        <div class="el-btn" onclick="applyQuickDesign('montaje')"><span class="icon">⚙</span> Montaje Industrial</div>
        <div class="el-btn" onclick="applyQuickDesign('lowboy')"><span class="icon">🚛</span> Transporte / Lowboy</div>
        <div class="el-btn" onclick="applyQuickDesign('proyecto')"><span class="icon">✅</span> Proyecto Completado</div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Marketing</div>
        <div class="el-btn" onclick="applyQuickDesign('dato')"><span class="icon">📊</span> Dato impactante</div>
        <div class="el-btn" onclick="applyQuickDesign('antesdespues')"><span class="icon">↔</span> Antes / Después</div>
        <div class="el-btn" onclick="applyQuickDesign('servicio')"><span class="icon">📋</span> Lista de servicios</div>
        <div class="el-btn" onclick="applyQuickDesign('seguridad')"><span class="icon">🛡</span> Seguridad Industrial</div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Corporativo</div>
        <div class="el-btn" onclick="applyQuickDesign('contacto')"><span class="icon">📞</span> Tarjeta de contacto</div>
        <div class="el-btn" onclick="applyQuickDesign('cotizacion')"><span class="icon">📄</span> Pide tu cotización</div>
        <div class="el-btn" onclick="applyQuickDesign('equipo')"><span class="icon">👷</span> Nuestro equipo</div>
      </div>`;
  } else if (tab === 'elements') {
    body.innerHTML = `
      <div class="sb-section">
        <div class="sb-label">Texto</div>
        <div class="el-btn" onclick="addHeading()"><span class="icon">H</span> Título grande</div>
        <div class="el-btn" onclick="addSubheading()"><span class="icon">h</span> Subtítulo</div>
        <div class="el-btn" onclick="addBody()"><span class="icon">¶</span> Texto cuerpo</div>
        <div class="el-btn" onclick="addBrandName()"><span class="icon">★</span> MICSA (marca)</div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Formas</div>
        <div class="el-btn" onclick="addRect()"><span class="icon">◻</span> Rectángulo</div>
        <div class="el-btn" onclick="addLine()"><span class="icon">─</span> Línea</div>
        <div class="el-btn" onclick="addAccentBar()"><span class="icon">▐</span> Barra de acento</div>
        <div class="el-btn" onclick="addOverlay()"><span class="icon">▓</span> Overlay oscuro</div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Composición</div>
        <div class="el-btn" onclick="addTag()"><span class="icon">⊞</span> Etiqueta / Tag</div>
        <div class="el-btn" onclick="addStatBox()"><span class="icon">▣</span> Caja de estadística</div>
      </div>`;
  } else if (tab === 'photos') {
    body.innerHTML = `
      <div class="sb-section">
        <div class="sb-label">Subir imágenes</div>
        <div class="upload-zone">
          <div class="uz-icon">📷</div>
          <div class="uz-text">Click o arrastra una imagen</div>
          <input type="file" accept="image/*" multiple onchange="handlePhotoUpload(this)">
        </div>
        ${uploadedPhotos.map(p => `
          <div class="photo-thumb" onclick="addPhotoToCanvas('${p.id}')">
            <img src="${p.url}" alt="${p.name}">
            <div class="del" onclick="event.stopPropagation();removePhoto('${p.id}')">✕</div>
          </div>
        `).join('')}
        ${uploadedPhotos.length === 0 ? '<p style="font-size:10px;color:var(--mut);text-align:center;">Sube fotos para usarlas en tu diseño</p>' : '<p style="font-size:9px;color:var(--acc);text-align:center;margin-top:8px;line-height:1.5;">💡 Tip: Selecciona un placeholder en el canvas y luego haz clic en la foto para reemplazarlo</p>'}
      </div>`;
  } else if (tab === 'brand') {
    body.innerHTML = `
      <div class="sb-section">
        <div class="sb-label">Colores de marca</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${BRAND.colors.map(c => `<div style="width:32px;height:32px;background:${c};border:1px solid var(--border);border-radius:4px;cursor:pointer;" title="${c}" onclick="applyBrandColor('${c}')"></div>`).join('')}
        </div>
      </div>
      <div class="sb-section">
        <div class="sb-label">Fuentes</div>
        ${BRAND.fonts.map(f => `<div class="el-btn" onclick="applyBrandFont('${f}')" style="font-family:'${f}';font-size:14px;">${f}</div>`).join('')}
      </div>
      <div class="sb-section">
        <div class="sb-label">Fondo del canvas</div>
        <div class="prop-row">
          <label>Color</label>
          <input type="color" class="prop-color" value="#06060a" onchange="canvasBg=this.value;renderAll()">
        </div>
      </div>`;
  }
}

// ═══════════════════════════════════════════════════
//  ADD ELEMENTS
// ═══════════════════════════════════════════════════
function addHeading() { saveState(); elements.push(makeText('TÍTULO AQUÍ', { fontSize: 72, fontWeight: '900' })); selectedId = elements[elements.length-1].id; renderAll(); }
function addSubheading() { saveState(); elements.push(makeText('Subtítulo aquí', { fontSize: 36, fontWeight: '600', color: '#c8a84b' })); selectedId = elements[elements.length-1].id; renderAll(); }
function addBody() { saveState(); elements.push(makeText('Texto descriptivo para tu publicación.', { fontSize: 20, fontWeight: '400', fontFamily: 'Barlow', color: '#8a9faf', w: 400 })); selectedId = elements[elements.length-1].id; renderAll(); }
function addBrandName() { saveState(); elements.push(makeText('MICSA', { fontSize: 36, fontFamily: 'Black Ops One', fontWeight: '400', letterSpacing: 4, color: '#f0f4f8' })); selectedId = elements[elements.length-1].id; renderAll(); }
function addRect() { saveState(); elements.push(makeRect()); selectedId = elements[elements.length-1].id; renderAll(); }

// ═══════════════════════════════════════════════════
function handlePhotoUpload(input) {
  Array.from(input.files).forEach(file => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const id = 'ph_' + nextId++;
      uploadedPhotos.push({ id, img, name: file.name, url });
      renderSidebar('photos');
    };
    img.src = url;
  });
}
function addPhotoToCanvas(photoId) {
  const ph = uploadedPhotos.find(p => p.id === photoId);
  if (!ph) return;
  saveState();
  // If a placeholder is selected, replace it with the photo
  const sel = elements.find(e => e.id === selectedId);
  if (sel && sel.type === 'placeholder') {
    const imgEl = makeImage(ph.img, ph.url, { x: sel.x, y: sel.y, w: sel.w, h: sel.h });
    const idx = elements.findIndex(e => e.id === sel.id);
    elements.splice(idx, 1, imgEl);
    selectedId = imgEl.id;
    renderAll();
    return;
  }
  // Otherwise, insert photo after backgrounds but before text/overlays
  const imgEl = makeImage(ph.img, ph.url);
  // Find first text element index to insert before it
  let insertIdx = elements.findIndex(e => e.type === 'text' || e.type === 'placeholder');
  if (insertIdx === -1) insertIdx = elements.length;
  elements.splice(insertIdx, 0, imgEl);
  selectedId = imgEl.id;
  renderAll();
}
function removePhoto(photoId) {
  uploadedPhotos = uploadedPhotos.filter(p => p.id !== photoId);
  renderSidebar('photos');
}

function selectTemplate(idx) {
  const t = TEMPLATES[idx];
  if (t.custom) {
    const w = prompt('Ancho (px):', canvasW);
    const h = prompt('Alto (px):', canvasH);
    if (w && h) { canvasW = parseInt(w); canvasH = parseInt(h); }
  } else {
    canvasW = t.w; canvasH = t.h;
  }
  setupCanvas();
  renderAll();
  renderSidebar('templates');
}

  } else if (type === 'equipo') {

    elements.push(makeText('Personal capacitado con certificaciones DC-3,\nNOM-006 y más de 10 años de experiencia.', { x:W*0.05, y:H*0.84, w:W*0.55, h:40, fontSize:14, fontWeight:'400', fontFamily:'Barlow', color:gray, align:'left', lineHeight:1.6 }));

// ═══════════════════════════════════════════════════
//  BRAND ACTIONS
// ═══════════════════════════════════════════════════
let canvasBg = '#06060a';
function applyBrandColor(c) {
  const el = elements.find(e => e.id === selectedId);
  if (!el) return;
  saveState();
  el.color = c;
  renderAll();
}
function applyBrandFont(f) {
  const el = elements.find(e => e.id === selectedId);
  if (!el || el.type !== 'text') return;
  saveState();
  el.fontFamily = f;
  renderAll();
}

// ═══════════════════════════════════════════════════
//  CANVAS SETUP & ZOOM
// ═══════════════════════════════════════════════════
const cv = document.getElementById('main');
const ctx = cv.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

function setupCanvas() {
  cv.width = canvasW;
  cv.height = canvasH;
  zoomFit();
}
function zoomFit() {
  const area = document.getElementById('canvas-area');
  const aw = area.clientWidth - 60, ah = area.clientHeight - 60;
  zoom = Math.min(aw / canvasW, ah / canvasH, 1);
  applyZoom();
}
function zoomBy(d) {
  zoom = Math.max(0.1, Math.min(3, zoom + d));
  applyZoom();
}
function applyZoom() {
  wrap.style.width = (canvasW * zoom) + 'px';
  wrap.style.height = (canvasH * zoom) + 'px';
  cv.style.width = (canvasW * zoom) + 'px';
  cv.style.height = (canvasH * zoom) + 'px';
  document.getElementById('zoom-val').textContent = Math.round(zoom * 100) + '%';
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function renderAll() {
  ctx.clearRect(0, 0, canvasW, canvasH);
  // Background
  ctx.fillStyle = canvasBg;
  ctx.fillRect(0, 0, canvasW, canvasH);
  // Elements
  elements.forEach(el => renderElement(el));
  // Selection
  const sel = elements.find(e => e.id === selectedId);
  if (sel) drawSelection(sel);
  // Props
  renderProps();
}

function renderElement(el) {
  ctx.save();
  ctx.globalAlpha = el.opacity ?? 1;
  if (el.type === 'rect') {
    ctx.fillStyle = el.color;
    if (el.radius > 0) {
      ctx.beginPath(); ctx.roundRect(el.x, el.y, el.w, el.h, el.radius); ctx.fill();
      if (el.borderColor && el.borderColor !== 'none' && el.borderWidth > 0) {
        ctx.strokeStyle = el.borderColor; ctx.lineWidth = el.borderWidth; ctx.stroke();
      }
    } else {
      ctx.fillRect(el.x, el.y, el.w, el.h);
      if (el.borderColor && el.borderColor !== 'none' && el.borderWidth > 0) {
        ctx.strokeStyle = el.borderColor; ctx.lineWidth = el.borderWidth;
        ctx.strokeRect(el.x, el.y, el.w, el.h);
      }
    }
  } else if (el.type === 'line') {
    ctx.fillStyle = el.color;
    ctx.fillRect(el.x, el.y, el.w, el.h);
  } else if (el.type === 'image') {
    if (el.img) {
      if (el.radius > 0) {
        ctx.beginPath(); ctx.roundRect(el.x, el.y, el.w, el.h, el.radius); ctx.clip();
      }
      ctx.drawImage(el.img, el.x, el.y, el.w, el.h);
    }
  } else if (el.type === 'placeholder') {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(el.x, el.y, el.w, el.h);
    ctx.strokeStyle = '#c8a84b55';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.strokeRect(el.x + 8, el.y + 8, el.w - 16, el.h - 16);
    ctx.setLineDash([]);
    ctx.fillStyle = '#c8a84b88';
    ctx.font = '600 14px "Barlow Condensed"';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '2px';
    ctx.fillText('📷', el.x + el.w/2, el.y + el.h/2 - 10);
    ctx.font = '600 11px "Barlow Condensed"';
    ctx.fillText(el.label || 'SUBE TU FOTO AQUÍ', el.x + el.w/2, el.y + el.h/2 + 12);
  } else if (el.type === 'text') {
    ctx.fillStyle = el.color;
    ctx.font = `${el.fontWeight} ${el.fontSize}px '${el.fontFamily}'`;
    ctx.textAlign = el.align || 'center';
    ctx.letterSpacing = (el.letterSpacing || 0) + 'px';
    const lines = el.text.split('\n');
    const lh = el.fontSize * (el.lineHeight || 1.2);
    let tx = el.align === 'left' ? el.x : el.align === 'right' ? el.x + el.w : el.x + el.w / 2;
    lines.forEach((line, i) => {
      ctx.fillText(line, tx, el.y + el.fontSize + i * lh);
    });
  }
  ctx.restore();
}

function drawSelection(el) {
  ctx.save();
  ctx.strokeStyle = '#c8a84b';
  ctx.lineWidth = 2 / zoom;
  ctx.setLineDash([6 / zoom, 4 / zoom]);
  ctx.strokeRect(el.x - 2, el.y - 2, el.w + 4, el.h + 4);
  ctx.setLineDash([]);
  // Handles
  const hs = 8 / zoom;
  ctx.fillStyle = '#c8a84b';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5 / zoom;
  [[el.x + el.w, el.y + el.h]].forEach(([hx, hy]) => {
    ctx.fillRect(hx - hs/2, hy - hs/2, hs, hs);
    ctx.strokeRect(hx - hs/2, hy - hs/2, hs, hs);
  });
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  MOUSE INTERACTION
// ═══════════════════════════════════════════════════
function canvasCoords(e) {
  const r = cv.getBoundingClientRect();
  return { x: (e.clientX - r.left) / zoom, y: (e.clientY - r.top) / zoom };
}

function hitTest(mx, my) {
  for (let i = elements.length - 1; i >= 0; i--) {
    const el = elements[i];
    if (mx >= el.x && mx <= el.x + el.w && my >= el.y && my <= el.y + el.h) return el;
  }
  return null;
}

function isOnHandle(el, mx, my) {
  const hs = 12 / zoom;
  const hx = el.x + el.w, hy = el.y + el.h;
  return Math.abs(mx - hx) < hs && Math.abs(my - hy) < hs;
}

function canvasMouseDown(e) {
  if (e.target !== cv) return;
  const { x, y } = canvasCoords(e);
  const sel = elements.find(el => el.id === selectedId);
  // Check resize handle first
  if (sel && isOnHandle(sel, x, y)) {
    saveState();
    resizing = { id: sel.id, startX: x, startY: y, startW: sel.w, startH: sel.h };
    return;
  }
  const hit = hitTest(x, y);
  if (hit) {
    if (hit.id !== selectedId) saveState();
    selectedId = hit.id;
    dragging = { id: hit.id, offX: x - hit.x, offY: y - hit.y };
    renderAll();
  } else {
    selectedId = null;
    renderAll();
  }
}

function canvasMouseMove(e) {
  const { x, y } = canvasCoords(e);
  if (dragging) {
    const el = elements.find(e => e.id === dragging.id);
    if (el) {
      el.x = Math.round(x - dragging.offX);
      el.y = Math.round(y - dragging.offY);
      renderAll();
    }
  } else if (resizing) {
    const el = elements.find(e => e.id === resizing.id);
    if (el) {
      el.w = Math.max(20, Math.round(resizing.startW + (x - resizing.startX)));
      el.h = Math.max(10, Math.round(resizing.startH + (y - resizing.startY)));
      renderAll();
    }
  } else {
    // Cursor
    const sel = elements.find(el => el.id === selectedId);
    if (sel && isOnHandle(sel, x, y)) {
      cv.style.cursor = 'nwse-resize';
    } else if (hitTest(x, y)) {
      cv.style.cursor = 'move';
    } else {
      cv.style.cursor = 'default';
    }
  }
}

function canvasMouseUp() {
  if (dragging) { saveState(); }
  dragging = null;
  resizing = null;
}

// ═══════════════════════════════════════════════════
//  PROPERTIES PANEL
// ═══════════════════════════════════════════════════
function renderProps() {
  const body = document.getElementById('props-body');
  const el = elements.find(e => e.id === selectedId);
  if (!el) {
    body.innerHTML = `<div class="prop-section"><div class="prop-label">Canvas</div>
      <p style="font-size:11px;color:var(--mut);line-height:1.5;">Selecciona un elemento para editar sus propiedades.</p>
      <div class="prop-row" style="margin-top:10px;"><label>W</label><input class="prop-input prop-input-sm" value="${canvasW}" onchange="canvasW=+this.value;setupCanvas();renderAll()">
      <label>H</label><input class="prop-input prop-input-sm" value="${canvasH}" onchange="canvasH=+this.value;setupCanvas();renderAll()"></div>
    </div>`;
    return;
  }
  let html = '';
  // Position
  html += `<div class="prop-section"><div class="prop-label">Posición y tamaño</div>
    <div class="prop-row"><label>X</label><input class="prop-input prop-input-sm" type="number" value="${Math.round(el.x)}" onchange="setProp(${el.id},'x',+this.value)">
    <label>Y</label><input class="prop-input prop-input-sm" type="number" value="${Math.round(el.y)}" onchange="setProp(${el.id},'y',+this.value)"></div>
    <div class="prop-row"><label>W</label><input class="prop-input prop-input-sm" type="number" value="${Math.round(el.w)}" onchange="setProp(${el.id},'w',+this.value)">
    <label>H</label><input class="prop-input prop-input-sm" type="number" value="${Math.round(el.h)}" onchange="setProp(${el.id},'h',+this.value)"></div>
    <div class="prop-row"><label>Op.</label><input type="range" class="prop-range" min="0" max="1" step="0.05" value="${el.opacity}" onchange="setProp(${el.id},'opacity',+this.value)">
    <span style="font-size:10px;color:var(--mut);min-width:30px;">${Math.round(el.opacity*100)}%</span></div>
  </div>`;
  // Type-specific
  if (el.type === 'text') {
    html += `<div class="prop-section"><div class="prop-label">Texto</div>
      <textarea class="prop-input" style="height:60px;resize:vertical;margin-bottom:8px;" onchange="setProp(${el.id},'text',this.value)">${el.text}</textarea>
      <div class="prop-row"><label>Size</label><input class="prop-input prop-input-sm" type="number" value="${el.fontSize}" onchange="setProp(${el.id},'fontSize',+this.value)"></div>
      <div class="prop-row"><label>Peso</label><select class="prop-input" onchange="setProp(${el.id},'fontWeight',this.value)">
        ${['300','400','500','600','700','900'].map(w => `<option value="${w}" ${el.fontWeight===w?'selected':''}>${w}</option>`).join('')}
      </select></div>
      <div class="prop-row"><label>Font</label><select class="prop-input" onchange="setProp(${el.id},'fontFamily',this.value)">
        ${BRAND.fonts.map(f => `<option value="${f}" ${el.fontFamily===f?'selected':''}>${f}</option>`).join('')}
      </select></div>
      <div class="prop-row"><label>Align</label><select class="prop-input" onchange="setProp(${el.id},'align',this.value)">
        <option value="left" ${el.align==='left'?'selected':''}>Izquierda</option>
        <option value="center" ${el.align==='center'?'selected':''}>Centro</option>
        <option value="right" ${el.align==='right'?'selected':''}>Derecha</option>
      </select></div>
      <div class="prop-row"><label>Color</label><input type="color" class="prop-color" value="${el.color}" onchange="setProp(${el.id},'color',this.value)"></div>
      <div class="prop-row"><label>Esp.</label><input class="prop-input prop-input-sm" type="number" value="${el.letterSpacing||0}" onchange="setProp(${el.id},'letterSpacing',+this.value)"></div>
    </div>`;
  } else if (el.type === 'rect' || el.type === 'line') {
    html += `<div class="prop-section"><div class="prop-label">Estilo</div>
      <div class="prop-row"><label>Color</label><input type="color" class="prop-color" value="${el.color}" onchange="setProp(${el.id},'color',this.value)"></div>
      ${el.type === 'rect' ? `<div class="prop-row"><label>Radio</label><input class="prop-input prop-input-sm" type="number" value="${el.radius||0}" onchange="setProp(${el.id},'radius',+this.value)"></div>
      <div class="prop-row"><label>Borde</label><input type="color" class="prop-color" value="${el.borderColor==='none'?'#c8a84b':el.borderColor}" onchange="setProp(${el.id},'borderColor',this.value)">
      <input class="prop-input prop-input-sm" type="number" value="${el.borderWidth||0}" onchange="setProp(${el.id},'borderWidth',+this.value)" placeholder="px"></div>` : ''}
    </div>`;
  } else if (el.type === 'image') {
    html += `<div class="prop-section"><div class="prop-label">Imagen</div>
      <div class="prop-row"><label>Radio</label><input class="prop-input prop-input-sm" type="number" value="${el.radius||0}" onchange="setProp(${el.id},'radius',+this.value)"></div>
    </div>`;
  } else if (el.type === 'placeholder') {
    html += `<div class="prop-section"><div class="prop-label">Placeholder de foto</div>
      <p style="font-size:11px;color:var(--mut);line-height:1.5;">Ve a la pestaña <b>Fotos</b>, sube una imagen y haz clic en ella para reemplazar este placeholder.</p>
    </div>`;
  }
  // Layer controls
  html += `<div class="prop-section"><div class="prop-label">Capa</div>
    <div style="display:flex;gap:4px;">
      <button class="btn btn-sec" style="flex:1;padding:5px;" onclick="moveLayer(${el.id},-1)">↓ Atrás</button>
      <button class="btn btn-sec" style="flex:1;padding:5px;" onclick="moveLayer(${el.id},1)">↑ Frente</button>
    </div>
    <button class="btn btn-sec" style="width:100%;margin-top:6px;padding:5px;" onclick="duplicateEl(${el.id})">⧉ Duplicar</button>
    <button class="prop-delete" onclick="deleteEl(${el.id})">✕ Eliminar elemento</button>
  </div>`;
  body.innerHTML = html;
}

function setProp(id, key, val) {
  const el = elements.find(e => e.id === id);
  if (!el) return;
  saveState();
  el[key] = val;
  renderAll();
}
function moveLayer(id, dir) {
  const idx = elements.findIndex(e => e.id === id);
  const ni = idx + dir;
  if (ni < 0 || ni >= elements.length) return;
  saveState();
  [elements[idx], elements[ni]] = [elements[ni], elements[idx]];
  renderAll();
}
function duplicateEl(id) {
  const el = elements.find(e => e.id === id);
  if (!el) return;
  saveState();
  const clone = { ...el, id: nextId++, x: el.x + 20, y: el.y + 20 };
  elements.push(clone);
  selectedId = clone.id;
  renderAll();
}
function deleteEl(id) {
  saveState();
  elements = elements.filter(e => e.id !== id);
  selectedId = null;
  renderAll();
}

// ═══════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  const el = elements.find(el => el.id === selectedId);
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (el) { deleteEl(el.id); e.preventDefault(); }
  }
  if (e.key === 'Escape') { selectedId = null; renderAll(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoAction(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redoAction(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); if (el) duplicateEl(el.id); }
  // Arrow keys
  if (el && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
    const step = e.shiftKey ? 10 : 1;
    saveState();
    if (e.key === 'ArrowUp') el.y -= step;
    if (e.key === 'ArrowDown') el.y += step;
    if (e.key === 'ArrowLeft') el.x -= step;
    if (e.key === 'ArrowRight') el.x += step;
    renderAll();
  }
});

// Double-click to edit text
cv.addEventListener('dblclick', e => {
  const { x, y } = canvasCoords(e);
  const hit = hitTest(x, y);
  if (hit && hit.type === 'text') {
    const newText = prompt('Editar texto:', hit.text);
    if (newText !== null) {
      saveState();
      hit.text = newText;
      renderAll();
    }
  }
});

// ═══════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════
function exportCanvas() {
  // Render without selection
  const prevSel = selectedId;
  selectedId = null;
  renderAll();
  const link = document.createElement('a');
  link.download = `MICSA_${canvasW}x${canvasH}.png`;
  link.href = cv.toDataURL('image/png');
  link.click();
  selectedId = prevSel;
  renderAll();
}

setupCanvas();
renderSidebar('templates');
renderAll();

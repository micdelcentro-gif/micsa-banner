<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MICSA · Diseñador de Publicidad</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#f0f0f4;--panel:#fff;--border:#e2e2e8;--acc:#2874A6;--acc-light:#e8f4fd;--txt:#1a1a2e;--mut:#8a8a9a;--green:#1a8a35;--red:#d42020;--in:#f5f5f8;--sidebar-bg:#1a1a2e;--sidebar-w:72px;--drawer-w:280px;}
html,body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none;}
.mso{font-family:'Material Symbols Outlined';font-size:22px;font-weight:400;line-height:1;vertical-align:middle;}

/* ── TOP BAR ── */
#top{height:52px;min-height:52px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:100;}
.logo-area{display:flex;align-items:center;gap:10px;}
.logo{font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:3px;color:var(--acc);}
.logo-sub{font-size:10px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;}
.top-center{display:flex;align-items:center;gap:6px;}
.top-acts{display:flex;gap:8px;align-items:center;}
.btn{font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;letter-spacing:.5px;padding:8px 16px;border-radius:8px;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;gap:6px;}
.btn-acc{background:var(--acc);color:#fff;}
.btn-acc:hover{opacity:.9;}
.btn-ghost{background:transparent;color:var(--mut);padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:14px;}
.btn-ghost:hover{background:var(--in);color:var(--txt);}
.btn-outline{background:#fff;color:var(--txt);border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;}
.btn-outline:hover{border-color:var(--acc);color:var(--acc);}

/* ── LAYOUT ── */
#app{flex:1;display:flex;overflow:hidden;}

/* ── ICON SIDEBAR (like Canva) ── */
#icon-bar{width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;flex-shrink:0;z-index:50;}
.ib-item{width:56px;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border-radius:10px;transition:all .12s;color:rgba(255,255,255,.5);}
.ib-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);}
.ib-item.active{background:rgba(255,255,255,.12);color:#fff;}
.ib-item .mso{font-size:22px;}
.ib-item span:last-child{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.ib-sep{width:36px;height:1px;background:rgba(255,255,255,.1);margin:6px 0;}

/* ── DRAWER PANEL ── */
#drawer{width:0;overflow:hidden;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s ease;flex-shrink:0;}
#drawer.open{width:var(--drawer-w);}
#drawer-header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#drawer-title{font-size:14px;font-weight:700;color:var(--txt);}
#drawer-close{background:none;border:none;cursor:pointer;color:var(--mut);font-size:18px;padding:4px;border-radius:6px;}
#drawer-close:hover{background:var(--in);color:var(--txt);}
#drawer-body{flex:1;overflow-y:auto;padding:0 14px 14px;scrollbar-width:thin;scrollbar-color:#ddd transparent;}
.d-section{margin-bottom:16px;}
.d-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:8px;padding-top:4px;}
.d-search{width:100%;padding:8px 12px;background:var(--in);border:1px solid var(--border);border-radius:8px;font-family:'Barlow',sans-serif;font-size:12px;color:var(--txt);outline:none;margin-bottom:12px;}
.d-search:focus{border-color:var(--acc);}

/* Template cards */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tpl-card{background:var(--in);border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;transition:all .15s;text-align:center;}
.tpl-card:hover{border-color:var(--acc);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.tpl-card.active{border-color:var(--acc);background:var(--acc-light);}
.tpl-preview{width:100%;aspect-ratio:var(--ar,1/1);background:#e0e0e6;border-radius:4px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--mut);}
.tpl-name{font-size:10px;font-weight:600;color:var(--txt);}
.tpl-size{font-size:8px;color:var(--mut);margin-top:1px;}

/* Element buttons */
.el-btn{width:100%;background:var(--in);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .12s;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:6px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:12px;font-weight:500;}
.el-btn:hover{border-color:var(--acc);background:var(--acc-light);color:var(--acc);}
.el-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:6px;font-size:16px;border:1px solid var(--border);}

/* Quick design cards */
.qd-card{background:var(--in);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .12s;margin-bottom:8px;}
.qd-card:hover{border-color:var(--acc);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.qd-name{font-size:12px;font-weight:700;color:var(--txt);}
.qd-desc{font-size:10px;color:var(--mut);margin-top:2px;line-height:1.4;}

/* Photos */
.upload-zone{width:100%;padding:28px 12px;border:2px dashed var(--border);border-radius:10px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s;margin-bottom:10px;background:var(--in);}
.upload-zone:hover{border-color:var(--acc);background:var(--acc-light);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-zone .uz-icon{font-size:28px;margin-bottom:6px;color:var(--acc);}
.upload-zone .uz-text{font-size:11px;color:var(--mut);}
.photo-thumb{width:100%;aspect-ratio:16/9;background:var(--in);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;position:relative;margin-bottom:6px;transition:all .12s;}
.photo-thumb:hover{border-color:var(--acc);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-thumb .del{position:absolute;top:6px;right:6px;width:22px;height:22px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:6px;color:var(--red);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.photo-thumb .del:hover{background:var(--red);color:#fff;}

/* Layers */
.layer-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all .12s;background:#fff;}
.layer-item:hover{border-color:var(--acc);}
.layer-item.active{border-color:var(--acc);background:var(--acc-light);}
.layer-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--in);border-radius:6px;flex-shrink:0;}
.layer-info{flex:1;min-width:0;}
.layer-name{font-size:10px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.layer-type{font-size:8px;color:var(--mut);letter-spacing:.5px;}
.layer-acts{display:flex;gap:3px;}
.layer-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:10px;color:var(--mut);transition:all .12s;}
.layer-btn:hover{border-color:var(--acc);color:var(--acc);}
.layer-btn.del:hover{border-color:var(--red);color:var(--red);}

/* ── CANVAS AREA ── */
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;position:relative;}
#canvas-wrap{position:relative;box-shadow:0 2px 20px rgba(0,0,0,.1);border-radius:4px;}
canvas#main{display:block;cursor:default;}

/* ── RIGHT PANEL ── */
#props{width:250px;min-width:250px;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#ddd transparent;}
#props-header{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
#props-header span{font-size:12px;font-weight:700;color:var(--txt);}
.prop-section{padding:14px 16px;border-bottom:1px solid var(--border);}
.prop-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--acc);margin-bottom:10px;}
.prop-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.prop-row label{font-size:11px;color:var(--mut);min-width:32px;}
.prop-input{flex:1;background:var(--in);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:12px;outline:none;}
.prop-input:focus{border-color:var(--acc);}
.prop-input-sm{width:65px;}
.prop-color{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:0;background:none;}
.prop-color::-webkit-color-swatch-wrapper{padding:2px;}
.prop-color::-webkit-color-swatch{border:none;border-radius:4px;}
select.prop-input{cursor:pointer;}
.prop-range{flex:1;accent-color:var(--acc);}
.prop-delete{width:100%;background:#fff;border:1px solid #f0d0d0;color:var(--red);font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;padding:8px;border-radius:8px;cursor:pointer;margin-top:6px;}
.prop-delete:hover{background:#fde8e8;}

/* ── ZOOM BAR ── */
#zoom-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.95);border:1px solid var(--border);border-radius:10px;padding:6px 14px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.06);}
#zoom-bar .btn-ghost{padding:4px 8px;font-size:16px;}
#zoom-val{font-size:11px;color:var(--mut);min-width:40px;text-align:center;font-weight:600;}
</style>
</head>
<body>

<div id="top">
  <div class="logo-area">
    <span class="logo">MICSA</span>
    <span class="logo-sub">Diseñador</span>
  </div>
  <div class="top-center">
    <button class="btn-outline" onclick="undoAction()"><span class="mso" style="font-size:16px">undo</span> Deshacer</button>
    <button class="btn-outline" onclick="redoAction()"><span class="mso" style="font-size:16px">redo</span> Rehacer</button>
  </div>
  <div class="top-acts">
    <button class="btn-outline" style="background:#3fb950;color:#fff;border-color:#3fb950;" onclick="saveDesign()"><span class="mso" style="font-size:16px">favorite</span> Me Gusta</button>
    <button class="btn-outline" onclick="exportCanvas()"><span class="mso" style="font-size:16px">download</span> Descargar</button>
  </div>
</div>

<div id="app">
  <!-- ICON SIDEBAR -->
  <div id="icon-bar">
    <div class="ib-item active" data-panel="designs" onclick="openPanel(this,'designs')">
      <span class="mso">dashboard</span><span>Diseños</span>
    </div>
    <div class="ib-item" data-panel="elements" onclick="openPanel(this,'elements')">
      <span class="mso">widgets</span><span>Elementos</span>
    </div>
    <div class="ib-item" data-panel="text" onclick="openPanel(this,'text')">
      <span class="mso">title</span><span>Texto</span>
    </div>
    <div class="ib-item" data-panel="photos" onclick="openPanel(this,'photos')">
      <span class="mso">cloud_upload</span><span>Subidos</span>
    </div>
    <div class="ib-sep"></div>
    <div class="ib-item" data-panel="layers" onclick="openPanel(this,'layers')">
      <span class="mso">layers</span><span>Capas</span>
    </div>
    <div class="ib-item" data-panel="logo" onclick="openPanel(this,'logo')">
      <span class="mso">add_photo_alternate</span><span>Logo</span>
    </div>
    <div class="ib-item" data-panel="brand" onclick="openPanel(this,'brand')">
      <span class="mso">palette</span><span>Marca</span>
    </div>
    <div class="ib-item" data-panel="format" onclick="openPanel(this,'format')">
      <span class="mso">crop</span><span>Formato</span>
    </div>
    <div class="ib-sep"></div>
    <div class="ib-item" data-panel="gallery" onclick="openPanel(this,'gallery')">
      <span class="mso">collections</span><span>Galería</span>
    </div>
  </div>

  <!-- DRAWER -->
  <div id="drawer" class="open">
    <div id="drawer-header">
      <span id="drawer-title">Diseños</span>
      <button id="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div id="drawer-body"></div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-area" onmousedown="canvasMouseDown(event)" onmousemove="canvasMouseMove(event)" onmouseup="canvasMouseUp(event)">
    <div id="canvas-wrap">
      <canvas id="main"></canvas>
    </div>
    <div id="zoom-bar">
      <button class="btn-ghost" onclick="zoomBy(-0.1)">−</button>
      <span id="zoom-val">100%</span>
      <button class="btn-ghost" onclick="zoomBy(0.1)">+</button>
      <button class="btn-ghost" onclick="zoomFit()"><span class="mso" style="font-size:16px">fit_screen</span></button>
    </div>
  </div>

  <!-- RIGHT PROPERTIES -->
  <div id="props">
    <div id="props-header"><span>Propiedades</span></div>
    <div id="props-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let canvasW = 1080, canvasH = 1080;
let zoom = 1;
let elements = [];
let selectedId = null;
let dragging = null, resizing = null;
let uploadedPhotos = [];
let savedLogos = [];
let undoStack = [], redoStack = [];
let nextId = 1;
let canvasBg = '#06060a';
let currentPanel = 'designs';

const TEMPLATES = [
  { name:'Instagram Post', w:1080, h:1080, ar:'1/1' },
  { name:'Instagram Story', w:1080, h:1920, ar:'9/16' },
  { name:'Facebook Post', w:1200, h:628, ar:'1200/628' },
  { name:'Facebook Cover', w:820, h:312, ar:'820/312' },
  { name:'LinkedIn Post', w:1200, h:627, ar:'1200/627' },
  { name:'LinkedIn Banner', w:1584, h:396, ar:'1584/396' },
  { name:'Twitter/X', w:1200, h:675, ar:'16/9' },
  { name:'YouTube Thumb', w:1280, h:720, ar:'16/9' },
  { name:'WhatsApp', w:1080, h:1920, ar:'9/16' },
  { name:'Banner Web', w:1920, h:600, ar:'1920/600' },
  { name:'Tarjeta', w:1050, h:600, ar:'1050/600' },
  { name:'Personalizado', w:1080, h:1080, ar:'1/1', custom:true },
];

const BRAND = {
  colors:['#2874A6','#4A9AD4','#A0AEB8','#06060a','#1a1a2e','#f0f4f8','#E8842C','#f5a623','#c86b1a','#c8a84b','#e74c3c','#3fb950','#ffffff','#55667a','#333333','#8a9faf','#2c2c3e','#d4af37','#1abc9c','#9b59b6','#f39c12','#e67e22','#34495e','#ecf0f1'],
  fonts:['Barlow Condensed','Barlow','Black Ops One','Arial','Impact','Tahoma','Verdana','Georgia','Courier New','Trebuchet MS'],
};

// ═══════════════════════════════════════════════════
//  ELEMENT FACTORIES
// ═══════════════════════════════════════════════════
function makeText(text, o={}) {
  return { id:nextId++, type:'text', x:o.x??canvasW/2-150, y:o.y??canvasH/2-20, w:o.w??300, h:o.h??50,
    text, fontFamily:o.fontFamily??'Barlow Condensed', fontSize:o.fontSize??48, fontWeight:o.fontWeight??'700',
    color:o.color??'#f0f4f8', align:o.align??'center', opacity:o.opacity??1,
    letterSpacing:o.letterSpacing??0, lineHeight:o.lineHeight??1.2, locked:false };
}
function makeRect(o={}) {
  return { id:nextId++, type:'rect', x:o.x??canvasW/2-100, y:o.y??canvasH/2-50, w:o.w??200, h:o.h??100,
    color:o.color??'#2874A6', opacity:o.opacity??1, radius:o.radius??0,
    borderColor:o.borderColor??'none', borderWidth:o.borderWidth??0, locked:false };
}
function makeLine(o={}) {
  return { id:nextId++, type:'line', x:o.x??canvasW/2-150, y:o.y??canvasH/2, w:o.w??300, h:o.h??4,
    color:o.color??'#2874A6', opacity:o.opacity??0.8, locked:false };
}
function makeImage(img, url, o={}) {
  const ar = img.naturalWidth/img.naturalHeight;
  const fw = Math.min(canvasW*0.6, img.naturalWidth), fh = fw/ar;
  return { id:nextId++, type:'image', x:o.x??(canvasW-fw)/2, y:o.y??(canvasH-fh)/2,
    w:o.w??fw, h:o.h??fh, img, url, opacity:o.opacity??1, radius:o.radius??0, locked:false };
}
function makePlaceholder(o={}) {
  return { id:nextId++, type:'placeholder', x:o.x??0, y:o.y??0, w:o.w??canvasW*0.5, h:o.h??canvasH,
    label:o.label??'SUBE TU FOTO', opacity:1, locked:false };
}

// ═══════════════════════════════════════════════════
//  UNDO / REDO
// ═══════════════════════════════════════════════════
function saveState() {
  undoStack.push(JSON.stringify(elements.map(e => { const c={...e}; if(c.img){c._hasImg=true;delete c.img;} return c; })));
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}
function undoAction() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(elements.map(e => { const c={...e}; if(c.img){c._hasImg=true;delete c.img;} return c; })));
  elements = JSON.parse(undoStack.pop()).map(restoreImg);
  selectedId = null; renderAll();
}
function redoAction() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(elements.map(e => { const c={...e}; if(c.img){c._hasImg=true;delete c.img;} return c; })));
  elements = JSON.parse(redoStack.pop()).map(restoreImg);
  selectedId = null; renderAll();
}
function restoreImg(e) {
  if (e._hasImg) { const p=uploadedPhotos.find(p=>p.url===e.url); if(p) e.img=p.img; delete e._hasImg; }
  return e;
}

// ═══════════════════════════════════════════════════
//  SIDEBAR PANELS
// ═══════════════════════════════════════════════════
function openPanel(el, panel) {
  document.querySelectorAll('.ib-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentPanel = panel;
  document.getElementById('drawer').classList.add('open');
  renderDrawer(panel);
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.querySelectorAll('.ib-item').forEach(i => i.classList.remove('active'));
}
function renderDrawer(panel) {
  const body = document.getElementById('drawer-body');
  const title = document.getElementById('drawer-title');
  const W = canvasW, H = canvasH;

  if (panel === 'designs') {
    title.textContent = 'Diseños';
    body.innerHTML = `
      <div class="d-section">
        <div class="d-label">Montajes e Izajes</div>
        <div class="qd-card" onclick="applyQuickDesign('izaje')"><div class="qd-name">🏗 Izaje / Maniobra</div><div class="qd-desc">Foto izquierda + stats de tonelaje</div></div>
        <div class="qd-card" onclick="applyQuickDesign('montaje')"><div class="qd-name">⚙ Montaje Industrial</div><div class="qd-desc">Foto fondo + overlay + tags</div></div>
        <div class="qd-card" onclick="applyQuickDesign('lowboy')"><div class="qd-name">🚛 Transporte / Lowboy</div><div class="qd-desc">Split horizontal + cobertura</div></div>
        <div class="qd-card" onclick="applyQuickDesign('proyecto')"><div class="qd-name">✅ Proyecto Completado</div><div class="qd-desc">2 fotos + panel de datos</div></div>
      </div>
      <div class="d-section">
        <div class="d-label">Marketing</div>
        <div class="qd-card" onclick="applyQuickDesign('dato')"><div class="qd-name">📊 Dato Impactante</div><div class="qd-desc">Número gigante + foto fondo</div></div>
        <div class="qd-card" onclick="applyQuickDesign('antesdespues')"><div class="qd-name">↔ Antes / Después</div><div class="qd-desc">Split 50/50 para comparación</div></div>
        <div class="qd-card" onclick="applyQuickDesign('servicio')"><div class="qd-name">📋 Lista de Servicios</div><div class="qd-desc">Foto + 4 servicios listados</div></div>
        <div class="qd-card" onclick="applyQuickDesign('seguridad')"><div class="qd-name">🛡 Seguridad Industrial</div><div class="qd-desc">Checklist de certificaciones</div></div>
      </div>
      <div class="d-section">
        <div class="d-label">Corporativo</div>
        <div class="qd-card" onclick="applyQuickDesign('contacto')"><div class="qd-name">📞 Contacto</div><div class="qd-desc">Datos de MICSA + foto</div></div>
        <div class="qd-card" onclick="applyQuickDesign('cotizacion')"><div class="qd-name">📄 Pide tu Cotización</div><div class="qd-desc">Call-to-action con teléfono</div></div>

// ═══════════════════════════════════════════════════
//  PHOTOS
// ═══════════════════════════════════════════════════
function handlePhotoUpload(input) {
  Array.from(input.files).forEach(file => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const id = 'ph_' + nextId++;
      uploadedPhotos.push({ id, img, name: file.name, url });
      renderDrawer('photos');
      // Auto-fill first available placeholder
      const firstPh = elements.find(e => e.type === 'placeholder');
      if (firstPh) {
        saveState();
        replacePlaceholder(firstPh, { img, url });
        renderAll();
      }
    };
    img.src = url;
  });
}
function addPhotoToCanvas(photoId) {
  const ph = uploadedPhotos.find(p => p.id === photoId);
  if (!ph) return;
  saveState();
  const sel = elements.find(e => e.id === selectedId);
  if (sel && sel.type === 'placeholder') { replacePlaceholder(sel, ph); return; }
  const firstPh = elements.find(e => e.type === 'placeholder');
  if (firstPh) { replacePlaceholder(firstPh, ph); return; }
  const imgEl = makeImage(ph.img, ph.url, { x:0, y:0, w:canvasW, h:canvasH });
  const bgIdx = elements[0] && elements[0].type==='rect' && elements[0].w>=canvasW*0.9 ? 1 : 0;
  elements.splice(bgIdx, 0, imgEl);
  selectedId = imgEl.id;
  renderAll();
}
function replacePlaceholder(placeholder, photo) {
  const imgEl = makeImage(photo.img, photo.url, { x:placeholder.x, y:placeholder.y, w:placeholder.w, h:placeholder.h });
  const idx = elements.findIndex(e => e.id === placeholder.id);
  elements.splice(idx, 1, imgEl);
  selectedId = imgEl.id;
  renderAll();
}
function removePhoto(photoId) {
  uploadedPhotos = uploadedPhotos.filter(p => p.id !== photoId);
  renderDrawer('photos');
}

// ═══════════════════════════════════════════════════
//  LOGO
// ═══════════════════════════════════════════════════
function handleLogoUpload(input) {
  Array.from(input.files).forEach(file => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const id = 'logo_' + nextId++;
      savedLogos.push({ id, img, name: file.name, url });
      renderDrawer('logo');
      addLogoToCanvas(id);
    };
    img.src = url;
  });
}
function addLogoToCanvas(logoId) {
  const logo = savedLogos.find(l => l.id === logoId);
  if (!logo) return;
  saveState();
  const ar = logo.img.naturalWidth / logo.img.naturalHeight;
  const lw = Math.min(canvasW * 0.25, 250);
  const lh = lw / ar;
  const imgEl = makeImage(logo.img, logo.url, { x: canvasW * 0.04, y: canvasH * 0.04, w: lw, h: lh });
  elements.push(imgEl);
  selectedId = imgEl.id;
  renderAll();
}
function removeLogo(logoId) {
  savedLogos = savedLogos.filter(l => l.id !== logoId);
  renderDrawer('logo');
}

function selectTemplate(idx) {
  const t = TEMPLATES[idx];
  if (t.custom) {
    const w = prompt('Ancho (px):', canvasW);
    const h = prompt('Alto (px):', canvasH);
    if (w && h) { canvasW = parseInt(w); canvasH = parseInt(h); }
  } else { canvasW = t.w; canvasH = t.h; }
  setupCanvas(); renderAll(); renderDrawer('format');
}

function applyBrandColor(c){
  const el=elements.find(e=>e.id===selectedId);
  if(!el){showToast('Selecciona un elemento primero');return;}
  saveState();el.color=c;renderAll();
  showToast('Color aplicado: '+c);
}
function applyBrandFont(f){
  const el=elements.find(e=>e.id===selectedId);
  if(!el||el.type!=='text'){showToast('Selecciona un texto primero');return;}
  saveState();el.fontFamily=f;renderAll();
  showToast('Fuente: '+f);
}
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;font-family:Barlow,sans-serif;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',1500);
}

// ═══════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════
const cv = document.getElementById('main');
const ctx = cv.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

function setupCanvas(){cv.width=canvasW;cv.height=canvasH;zoomFit();}
function zoomFit(){const a=document.getElementById('canvas-area');zoom=Math.min((a.clientWidth-60)/canvasW,(a.clientHeight-60)/canvasH,1);applyZoom();}
function zoomBy(d){zoom=Math.max(0.1,Math.min(3,zoom+d));applyZoom();}
function applyZoom(){
  wrap.style.width=(canvasW*zoom)+'px';wrap.style.height=(canvasH*zoom)+'px';
  cv.style.width=(canvasW*zoom)+'px';cv.style.height=(canvasH*zoom)+'px';
  document.getElementById('zoom-val').textContent=Math.round(zoom*100)+'%';
}

function renderAll(){
  ctx.clearRect(0,0,canvasW,canvasH);
  ctx.fillStyle=canvasBg;ctx.fillRect(0,0,canvasW,canvasH);
  elements.forEach(el=>renderElement(el));
  const sel=elements.find(e=>e.id===selectedId);
  if(sel) drawSelection(sel);
  renderProps();
  if(currentPanel==='layers') renderDrawer('layers');
}

function renderElement(el){
  ctx.save();ctx.globalAlpha=el.opacity??1;
  if(el.type==='rect'){
    ctx.fillStyle=el.color;
    if(el.radius>0){ctx.beginPath();ctx.roundRect(el.x,el.y,el.w,el.h,el.radius);ctx.fill();
      if(el.borderColor&&el.borderColor!=='none'&&el.borderWidth>0){ctx.strokeStyle=el.borderColor;ctx.lineWidth=el.borderWidth;ctx.stroke();}
    } else {ctx.fillRect(el.x,el.y,el.w,el.h);
      if(el.borderColor&&el.borderColor!=='none'&&el.borderWidth>0){ctx.strokeStyle=el.borderColor;ctx.lineWidth=el.borderWidth;ctx.strokeRect(el.x,el.y,el.w,el.h);}
    }
  } else if(el.type==='line'){ctx.fillStyle=el.color;ctx.fillRect(el.x,el.y,el.w,el.h);
  } else if(el.type==='placeholder'){
    ctx.fillStyle='#1a1a2e';ctx.fillRect(el.x,el.y,el.w,el.h);
    ctx.strokeStyle='#2874A655';ctx.lineWidth=2;ctx.setLineDash([8,6]);
    ctx.strokeRect(el.x+8,el.y+8,el.w-16,el.h-16);ctx.setLineDash([]);
    ctx.fillStyle='#2874A688';ctx.font='600 14px "Barlow Condensed"';ctx.textAlign='center';ctx.letterSpacing='2px';
    ctx.fillText('📷',el.x+el.w/2,el.y+el.h/2-10);
    ctx.font='600 11px "Barlow Condensed"';
    ctx.fillText(el.label||'SUBE TU FOTO',el.x+el.w/2,el.y+el.h/2+12);
  } else if(el.type==='image'){
    if(el.img){
      if(el.radius>0){ctx.beginPath();ctx.roundRect(el.x,el.y,el.w,el.h,el.radius);ctx.clip();}
      else{ctx.beginPath();ctx.rect(el.x,el.y,el.w,el.h);ctx.clip();}
      // Draw with cover-fit (no distortion, crops excess)
      const iw=el.img.naturalWidth, ih=el.img.naturalHeight;
      const iar=iw/ih, ear=el.w/el.h;
      let sx=0,sy=0,sw=iw,sh=ih;
      if(iar>ear){sw=ih*ear;sx=(iw-sw)/2;}
      else{sh=iw/ear;sy=(ih-sh)/2;}
      ctx.drawImage(el.img,sx,sy,sw,sh,el.x,el.y,el.w,el.h);
    }
  } else if(el.type==='text'){
    ctx.fillStyle=el.color;ctx.font=`${el.fontWeight} ${el.fontSize}px '${el.fontFamily}'`;
    ctx.textAlign=el.align||'center';ctx.letterSpacing=(el.letterSpacing||0)+'px';
    const lines=el.text.split('\n'),lh=el.fontSize*(el.lineHeight||1.2);
    let tx=el.align==='left'?el.x:el.align==='right'?el.x+el.w:el.x+el.w/2;
    lines.forEach((line,i)=>ctx.fillText(line,tx,el.y+el.fontSize+i*lh));
  }
  ctx.restore();
}

function drawSelection(el){
  ctx.save();ctx.strokeStyle='#b8952e';ctx.lineWidth=2/zoom;ctx.setLineDash([6/zoom,4/zoom]);
  ctx.strokeRect(el.x-2,el.y-2,el.w+4,el.h+4);ctx.setLineDash([]);
  const hs=8/zoom;ctx.fillStyle='#b8952e';ctx.strokeStyle='#fff';ctx.lineWidth=1.5/zoom;
  [[el.x+el.w,el.y+el.h]].forEach(([hx,hy])=>{ctx.fillRect(hx-hs/2,hy-hs/2,hs,hs);ctx.strokeRect(hx-hs/2,hy-hs/2,hs,hs);});
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  MOUSE
// ═══════════════════════════════════════════════════
function canvasCoords(e){const r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)/zoom,y:(e.clientY-r.top)/zoom};}
function hitTest(mx,my){for(let i=elements.length-1;i>=0;i--){const el=elements[i];if(mx>=el.x&&mx<=el.x+el.w&&my>=el.y&&my<=el.y+el.h)return el;}return null;}
function isOnHandle(el,mx,my){const hs=12/zoom;return Math.abs(mx-(el.x+el.w))<hs&&Math.abs(my-(el.y+el.h))<hs;}

function canvasMouseDown(e){
  if(e.target!==cv)return;
  const{x,y}=canvasCoords(e);
  const sel=elements.find(el=>el.id===selectedId);
  if(sel&&isOnHandle(sel,x,y)){saveState();resizing={id:sel.id,startX:x,startY:y,startW:sel.w,startH:sel.h};return;}
  const hit=hitTest(x,y);
  if(hit){selectedId=hit.id;dragging={id:hit.id,offX:x-hit.x,offY:y-hit.y};renderAll();}
  else{selectedId=null;renderAll();}
}
function canvasMouseMove(e){
  const{x,y}=canvasCoords(e);
  if(dragging){const el=elements.find(e=>e.id===dragging.id);if(el){el.x=Math.round(x-dragging.offX);el.y=Math.round(y-dragging.offY);renderAll();}}
  else if(resizing){const el=elements.find(e=>e.id===resizing.id);if(el){el.w=Math.max(20,Math.round(resizing.startW+(x-resizing.startX)));el.h=Math.max(10,Math.round(resizing.startH+(y-resizing.startY)));renderAll();}}
  else{const sel=elements.find(el=>el.id===selectedId);
    if(sel&&isOnHandle(sel,x,y))cv.style.cursor='nwse-resize';else if(hitTest(x,y))cv.style.cursor='move';else cv.style.cursor='default';}
}
function canvasMouseUp(){if(dragging)saveState();dragging=null;resizing=null;}

// ═══════════════════════════════════════════════════
//  PROPERTIES
// ═══════════════════════════════════════════════════
function renderProps(){
  const body=document.getElementById('props-body');
  const el=elements.find(e=>e.id===selectedId);
  if(!el){body.innerHTML=`<div class="prop-section"><p style="font-size:12px;color:var(--mut);line-height:1.6;">Selecciona un elemento en el canvas para editar sus propiedades.</p></div>`;return;}
  let h='';
  h+=`<div class="prop-section"><div class="prop-label">Posición y tamaño</div>
    <div class="prop-row"><label>X</label><input class="prop-input prop-input-sm" type="number" value="${Math.round(el.x)}" onchange="setProp(${el.id},'x',+this.value)">
    <label>Y</label><input class="prop-input prop-input-sm" type="number" value="${Math.round(el.y)}" onchange="setProp(${el.id},'y',+this.value)"></div>
    <div class="prop-row"><label>W</label><input class="prop-input prop-input-sm" type="number" value="${Math.round(el.w)}" onchange="setProp(${el.id},'w',+this.value)">
    <label>H</label><input class="prop-input prop-input-sm" type="number" value="${Math.round(el.h)}" onchange="setProp(${el.id},'h',+this.value)"></div>
    <div class="prop-row"><label>Op.</label><input type="range" class="prop-range" min="0" max="1" step="0.05" value="${el.opacity}" onchange="setProp(${el.id},'opacity',+this.value)">
    <span style="font-size:11px;color:var(--mut);min-width:32px;">${Math.round(el.opacity*100)}%</span></div></div>`;
  if(el.type==='text'){
    h+=`<div class="prop-section"><div class="prop-label">Texto</div>
      <textarea class="prop-input" style="height:60px;resize:vertical;margin-bottom:8px;" onchange="setProp(${el.id},'text',this.value)">${el.text}</textarea>
      <div class="prop-row"><label>Size</label><input class="prop-input prop-input-sm" type="number" value="${el.fontSize}" onchange="setProp(${el.id},'fontSize',+this.value)"></div>
      <div class="prop-row"><label>Peso</label><select class="prop-input" onchange="setProp(${el.id},'fontWeight',this.value)">
        ${['300','400','500','600','700','900'].map(w=>`<option value="${w}" ${el.fontWeight===w?'selected':''}>${w}</option>`).join('')}</select></div>
      <div class="prop-row"><label>Font</label><select class="prop-input" onchange="setProp(${el.id},'fontFamily',this.value)">
        ${BRAND.fonts.map(f=>`<option value="${f}" ${el.fontFamily===f?'selected':''}>${f}</option>`).join('')}</select></div>
      <div class="prop-row"><label>Align</label><select class="prop-input" onchange="setProp(${el.id},'align',this.value)">
        <option value="left" ${el.align==='left'?'selected':''}>Izquierda</option>
        <option value="center" ${el.align==='center'?'selected':''}>Centro</option>
        <option value="right" ${el.align==='right'?'selected':''}>Derecha</option></select></div>
      <div class="prop-row"><label>Color</label><input type="color" class="prop-color" value="${el.color}" onchange="setProp(${el.id},'color',this.value)"></div>
      <div class="prop-row"><label>Esp.</label><input class="prop-input prop-input-sm" type="number" value="${el.letterSpacing||0}" onchange="setProp(${el.id},'letterSpacing',+this.value)"></div></div>`;
  } else if(el.type==='rect'||el.type==='line'){
    h+=`<div class="prop-section"><div class="prop-label">Estilo</div>
      <div class="prop-row"><label>Color</label><input type="color" class="prop-color" value="${el.color}" onchange="setProp(${el.id},'color',this.value)"></div>
      ${el.type==='rect'?`<div class="prop-row"><label>Radio</label><input class="prop-input prop-input-sm" type="number" value="${el.radius||0}" onchange="setProp(${el.id},'radius',+this.value)"></div>
      <div class="prop-row"><label>Borde</label><input type="color" class="prop-color" value="${el.borderColor==='none'?'#c8a84b':el.borderColor}" onchange="setProp(${el.id},'borderColor',this.value)">
      <input class="prop-input prop-input-sm" type="number" value="${el.borderWidth||0}" onchange="setProp(${el.id},'borderWidth',+this.value)"></div>`:''}</div>`;
  } else if(el.type==='image'){
    h+=`<div class="prop-section"><div class="prop-label">Imagen</div>
      <div class="prop-row"><label>Radio</label><input class="prop-input prop-input-sm" type="number" value="${el.radius||0}" onchange="setProp(${el.id},'radius',+this.value)"></div></div>`;
  } else if(el.type==='placeholder'){
    h+=`<div class="prop-section"><div class="prop-label">Placeholder</div>
      <p style="font-size:11px;color:var(--mut);line-height:1.5;">Sube una foto en <b>Subidos</b> para reemplazar este placeholder.</p></div>`;
  }
  h+=`<div class="prop-section"><div class="prop-label">Capa</div>
    <div style="display:flex;gap:4px;">
      <button class="btn-outline" style="flex:1;padding:6px;" onclick="moveLayer(${el.id},-1)">↓ Atrás</button>
      <button class="btn-outline" style="flex:1;padding:6px;" onclick="moveLayer(${el.id},1)">↑ Frente</button></div>
    <button class="btn-outline" style="width:100%;margin-top:6px;padding:6px;" onclick="duplicateEl(${el.id})">⧉ Duplicar</button>
    <button class="prop-delete" onclick="deleteEl(${el.id})">✕ Eliminar</button></div>`;
  body.innerHTML=h;
}

function setProp(id,key,val){const el=elements.find(e=>e.id===id);if(!el)return;saveState();el[key]=val;renderAll();}
function moveLayer(id,dir){const idx=elements.findIndex(e=>e.id===id);const ni=idx+dir;if(ni<0||ni>=elements.length)return;saveState();[elements[idx],elements[ni]]=[elements[ni],elements[idx]];renderAll();}
function duplicateEl(id){const el=elements.find(e=>e.id===id);if(!el)return;saveState();const c={...el,id:nextId++,x:el.x+20,y:el.y+20};elements.push(c);selectedId=c.id;renderAll();}
function deleteEl(id){saveState();elements=elements.filter(e=>e.id!==id);selectedId=null;renderAll();}

// ═══════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  const el=elements.find(el=>el.id===selectedId);
  if((e.key==='Delete'||e.key==='Backspace')&&el){deleteEl(el.id);e.preventDefault();}
  if(e.key==='Escape'){selectedId=null;renderAll();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoAction();}
  if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();redoAction();}
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();if(el)duplicateEl(el.id);}
  if(el&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    e.preventDefault();const s=e.shiftKey?10:1;saveState();
    if(e.key==='ArrowUp')el.y-=s;if(e.key==='ArrowDown')el.y+=s;
    if(e.key==='ArrowLeft')el.x-=s;if(e.key==='ArrowRight')el.x+=s;renderAll();}
});
cv.addEventListener('dblclick',e=>{const{x,y}=canvasCoords(e);const hit=hitTest(x,y);
  if(hit&&hit.type==='text'){const t=prompt('Editar texto:',hit.text);if(t!==null){saveState();hit.text=t;renderAll();}}});

// ═══════════════════════════════════════════════════
//  EXPORT (full quality)
// ═══════════════════════════════════════════════════
function getFullQualityBlob(){
  return new Promise(resolve=>{
    const prev=selectedId;selectedId=null;renderAll();
    cv.toBlob(blob=>{selectedId=prev;renderAll();resolve(blob);},'image/png');
  });
}
function exportCanvas(){
  const prev=selectedId;selectedId=null;renderAll();
  const link=document.createElement('a');link.download=`MICSA_${canvasW}x${canvasH}.png`;
  link.href=cv.toDataURL('image/png');link.click();selectedId=prev;renderAll();
}

  try{

      headers:{'Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY}

  }catch(err){console.error(err);}
}

async function deleteDesign(id){

    await fetch(`${SUPABASE_URL}/rest/v1/designs?id=eq.${id}`,{
      method:'DELETE',headers:{'Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY}
    });

  }catch(err){showToast('Error al eliminar');}
}
